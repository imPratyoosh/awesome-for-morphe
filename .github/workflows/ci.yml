name: Sync Bundles

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Download and update bundles
        id: update
        run: |
          python scripts/discover.py
          python scripts/download.py --bundles
          if [ -n "$(git status --porcelain)" ]; then
            python scripts/download.py
            pip install google-play-scraper
            python scripts/update.py
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js environment
        if: steps.update.outputs.changed == 'true'
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Install dependencies and build
        if: steps.update.outputs.changed == 'true'
        run: |
          cd web
          npm install
          npm run build

      - name: Commit and push changes
        if: steps.update.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data/ docs/
          if ! git diff --staged --quiet; then
            git commit -m "Sync bundles"
            git push origin HEAD:main
          fi

      - name: Cleanup old workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run list -L 200 --json databaseId -q '.[].databaseId' | tail -n +91 | xargs -IID gh api "repos/$GITHUB_REPOSITORY/actions/runs/ID" -X DELETE || :
