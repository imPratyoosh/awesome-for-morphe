name: Sync Patch Bundles

on:
  schedule:
    - cron: "0 3/4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages

      - name: Download patch-bundles
        run: python src/download-patch-bundles.py

      - name: Check git changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update bundles
        if: steps.changes.outputs.changed == 'true'
        run: |
          pip install google-play-scraper
          python src/update-bundles.py

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data/
          git commit -m "Sync patch-bundles"
          git push origin HEAD:gh-pages

      - name: Cleanup old workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run list -L 200 --json databaseId -q '.[].databaseId' | tail -n +21 | xargs -IID gh api "repos/$GITHUB_REPOSITORY/actions/runs/ID" -X DELETE || :
