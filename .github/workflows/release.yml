name: Generate Release

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Download and process data
        run: |
          python scripts/discover.py
          python scripts/download.py --bundles
          if [ -n "$(git status --porcelain)" ]; then
            python scripts/download.py
          fi

          pip install google-play-scraper
          DAY_OF_MONTH=$(date +%d)
          if [ "$DAY_OF_MONTH" -eq 1 ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            python scripts/update.py --all
          else
            python scripts/update.py --daily
          fi

          python scripts/whats_new.py

      - name: Commit and push changes
        id: commit
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"

            TAG=$(date +'%Y.%m.%d')
            DAY=$(date +'%B %-d')

            git add data/ docs/
            git commit -m "Update release history (${TAG})"
            git push origin HEAD:main

            echo "changed=true" >> $GITHUB_OUTPUT
            echo "TAG=${TAG}" >> $GITHUB_ENV
            echo "DAY=${DAY}" >> $GITHUB_ENV
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        if: steps.commit.outputs.changed == 'true' && hashFiles('whats-new.md') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ env.TAG }}" --target "$(git rev-parse HEAD)" --title "🔔 What's New (${{ env.DAY }})" --notes-file whats-new.md --latest=false

      - name: Send Telegram release notification
        if: steps.commit.outputs.changed == 'true' && hashFiles('whats-new.md') != ''
        env:
          TG_CHAT: ${{ secrets.TG_CHAT }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
        run: python scripts/telegram.py
